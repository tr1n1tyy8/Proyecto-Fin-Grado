<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="/images/logo.png" />
    <link rel="stylesheet" href="/css/styles.css">
    <title>Crear una Cuenta - Capitalia</title>
</head>
<body>
    <header class="cabecera">
        <img src="/images/logo.png">
        <h1>Capitalia</h1>
        <div class="navegacion">
            <a href="/" class="nav-link">¿Quiénes Somos?</a>
            <a href="/compromiso_social" class="nav-link">Compromiso Social</a>
            <a href="/novedades" class="nav-link">Novedades</a>
            <a href="/mas_informacion" class="nav-link">Más Información</a>
        </div>
        <div class="botones">
            <a href="/registro">Registrarse</a>
            <a href="/acceso">Iniciar sesión</a>
        </div>
    </header>
    <div class="fondo">
        <div class="formulario">
            <img src="/images/logo completo.png" class="logo_formulario">
            <div class="contenedor">
                <h2>Crear una Cuenta</h2>
                
                <div class="situacion-laboral">
                    <h3>Queremos conocerte</h3>
                    <label for="situacion_laboral">¿Cuál es tu situación laboral?</label>
                    <select id="situacion_laboral" name="situacion_laboral" data-field="situacion_laboral">
                        <option value="">Selecciona una opción</option>
                        <option value="Empleado/a por cuenta ajena">Empleado/a por cuenta ajena</option>
                        <option value="Autónomo/a profesional independiente">Autónomo/a profesional independiente</option>
                        <option value="Desempleado/a">Desempleado/a</option>
                        <option value="Estudiante">Estudiante</option>
                        <option value="Jubilado/a">Jubilado/a</option>
                        <option value="Pensionista">Pensionista</option>
                        <option value="Otro">Otro</option>
                    </select>
                    <button type="button" class="btn-continuar" onclick="guardarSituacionLaboral()">Continuar</button>
                </div>
                
                <p>¿Ya tienes una cuenta? | <a href="/acceso">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>
    <footer class="pie">
        <p>© 2026 Capitalia. Todos los derechos reservados.</p>
        <p><a href="/politicas_privacidad">Política de Privacidad</a></p>
        <p><a href="/condiciones_uso">Condiciones de Uso</a></p>
    </footer>
    <script src="/js/main.js"></script>
    <script src="/js/registro-api.js"></script>
</body>
</html>
