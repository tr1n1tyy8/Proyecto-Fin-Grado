<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../images/logo.png" />
    <link rel="stylesheet" href="../css/styles.css">
    <title>Crear una Cuenta</title>
</head>
<body>
    <header class="cabecera">
        <img src="../images/logo.png">
        <h1>Capitalia</h1>
        <div class="navegacion">
            <a href="index.html" class="nav-link">¿Quiénes Somos?</a>
            <a href="compromiso_social.html" class="nav-link">Compromiso Social</a>
            <a href="novedades.html" class="nav-link">Novedades</a>
            <a href="contacto.html" class="nav-link">Contacto</a>
        </div>
        <div class="botones">
            <a href="registro.html">Registrarse</a>
            <a href="login.html">Iniciar sesión</a>
        </div>
    </header>
    <script src="../js/main.js"></script>
    <div class="fondo">
        <div class="formulario">
            <img src="../images/logo completo.png" class="logo_formulario">
            <div class="contenedor">
                <h2 style="margin-bottom: 15px; margin-top: 0;">Crear una Cuenta</h2>
                
                <div class="datos-personales">
                    <h3>Tu residencia</h3>
                    <form action="" method="post">
                        <div class="form-columnas">
                            <div class="form-columna">
                                <label>Calle de residencia</label>
                                <input type="text" required>
                                <label>Población</label>
                                <input type="text" required>
                            </div>
                            <div class="form-columna">
                                <label>Provincia</label>
                                <input type="text" required>
                                <label>Código Postal</label>
                                <input type="text" required>
                            </div>
                        </div>
                    </form>
                    <button type="button" class="btn-continuar" onclick="window.location.href='registro4.html'">Continuar</button>
                </div>
                
                <p style="margin-top: 0px;">¿Ya tienes una cuenta? | <a href="login.html">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>
    <footer class="pie">
        <p>© 2026 Capitalia. Todos los derechos reservados.</p>
        <p><a href="politicas_privacidad.html">Política de Privacidad</a></p>
        <p><a href="condiciones_uso.html">Condiciones de Uso</a></p>
        <p><a href="login_admin.html">Iniciar Sesión como Administrador</a></p>
    </footer>
</body>
</html>
