<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../images/logo.png" />
    <link rel="stylesheet" href="/css/styles.css">
    <title>Iniciar Sesión - Capitalia</title>
</head>
<body>
    <header class="cabecera">
        <img src="../images/logo.png">
        <h1>Capitalia</h1>
        <div class="navegacion">
            <a href="/" class="nav-link">¿Quiénes Somos?</a>
            <a href="/compromiso_social" class="nav-link">Compromiso Social</a>
            <a href="/novedades" class="nav-link">Novedades</a>
            <a href="/mas_informacion" class="nav-link">Más Información</a>
        </div>
        <div class="botones">
            <a href="/registro">Registrarse</a>
            <a href="/acceso">Iniciar sesión</a>
        </div>
    </header>
    <div class="fondo">
        <div class="formulario">
            <img src="../images/logo completo.png" class="logo_formulario">
            <div class="contenedor">
                <h2>Iniciar Sesión</h2>
                <form>
                    <label>Correo Electrónico</label>
                    <input type="text" id="email"required>
                    <label>Contraseña</label>
                    <input type="password" id="password" required>
                    <button type="submit">Iniciar sesión</button>
                </form>
                <p>¿No tienes una cuenta? | <a href="/registro">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
    <footer class="pie">
        <p>© 2026 Capitalia. Todos los derechos reservados.</p>
        <p><a href="/politicas_privacidad">Política de Privacidad</a></p>
        <p><a href="/condiciones_uso">Condiciones de Uso</a></p>
    </footer>
    <script src="/js/main.js"></script>
    <script src="/js/login_api.js"></script>
</body>
</html>
